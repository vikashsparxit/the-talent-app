<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verification code</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f4f4f5;padding:40px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background-color:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 4px 6px rgba(0,0,0,0.05);">
          <tr>
            <td style="background-color:#D64541;padding:32px 40px;text-align:center;">
              <img src="{{ .SiteURL }}/the-talent-app-icon.png" alt="The Talent App" width="48" height="48" style="display:block;margin:0 auto 12px;border-radius:10px;" />
              <h1 style="margin:0;color:#ffffff;font-size:22px;font-weight:600;letter-spacing:-0.02em;">The Talent App</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:40px;">
              <h2 style="margin:0 0 16px;color:#18181b;font-size:20px;font-weight:600;">Your verification code</h2>
              <p style="margin:0 0 24px;color:#52525b;font-size:16px;line-height:1.6;">Enter this code to verify your identity and continue in The Talent App.</p>
              <div style="background-color:#fafafa;border:1px solid #e4e4e7;border-radius:8px;padding:20px;text-align:center;margin-bottom:24px;">
                <span style="font-size:32px;font-weight:700;letter-spacing:0.3em;color:#18181b;font-family:monospace;">{{ .Token }}</span>
              </div>
              <p style="margin:0;color:#a1a1aa;font-size:13px;line-height:1.5;text-align:center;">This code expires shortly. If you didn't request it, you can safely ignore this email.</p>
            </td>
          </tr>
          <tr>
            <td style="padding:24px 40px;background-color:#fafafa;border-top:1px solid #e4e4e7;text-align:center;">
              <p style="margin:0;color:#a1a1aa;font-size:12px;line-height:1.6;">
                Built with love by <a href="https://www.sparxitsolutions.com" style="color:#D64541;text-decoration:none;font-weight:500;">SparxIT</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
